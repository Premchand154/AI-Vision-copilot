services:

  app:
    build: .
    container_name: ai_vision_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: ollama_server_2
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: